<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW3 - Banner Generator</title>
    <meta name="description"
        content="Generate your own I Stand With Iran banner. Upload your photo and create a dramatic banner with Iranian and Pakistani flags.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-particles" id="particles"></div>

    <!-- ========== COUNTRY SELECTION SCREEN ========== -->
    <div class="country-select-screen" id="countrySelectScreen">
        <div class="country-select-wrapper">
            <h1 class="country-select-title">Choose Your Side</h1>
            <p class="country-select-subtitle">Pick a country to continue</p>

            <div class="country-cards">
                <!-- Iran Card -->
                <div class="country-card country-card-iran" id="cardIran">
                    <div class="country-card-flag">🇮🇷</div>
                    <div class="country-card-glow iran-glow"></div>
                    <h2 class="country-card-name">Iran</h2>
                    <p class="country-card-desc">Generate your solidarity banner</p>
                </div>

                <div class="country-vs">VS</div>

                <!-- Israel/US Card -->
                <div class="country-card country-card-israel" id="cardIsrael">
                    <div class="country-card-flag">🇮🇱 🇺🇸</div>
                    <div class="country-card-glow israel-glow"></div>
                    <h2 class="country-card-name">Israel / US</h2>
                    <p class="country-card-desc">See what happens...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== MEME VIDEO SCREEN (hidden) ========== -->
    <div class="meme-screen" id="memeScreen" style="display:none;">
        <video id="memeVideo" class="meme-video" autoplay loop playsinline>
            <source src="mems.mp4" type="video/mp4">
        </video>
        <button class="meme-back-btn" id="memeBackBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
            Back
        </button>
    </div>

    <!-- ========== IRAN BANNER GENERATOR (hidden) ========== -->
    <div class="container" id="bannerApp" style="display:none;">
        <header class="header">
            <button class="back-to-select" id="backToSelectBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Back
            </button>
            <h1 class="title">
                <span class="title-flag title-iran">🇮🇷</span>
                I Stand With Iran
                <span class="title-flag title-pak">🇵🇰</span>
            </h1>
            <p class="subtitle">Upload your photo to generate your solidarity banner</p>
        </header>

        <main class="main-content">
            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                    </div>
                    <p class="upload-text">Drag & drop your photo here</p>
                    <p class="upload-hint">or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
            </div>

            <!-- Preview Section (hidden initially) -->
            <div class="preview-section" id="previewSection" style="display:none;">
                <div class="canvas-wrapper">
                    <canvas id="bannerCanvas" width="1280" height="720"></canvas>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">Photo Size</label>
                        <input type="range" id="photoSize" min="30" max="100" value="60" class="slider">
                    </div>
                    <div class="control-group">
                        <label class="control-label">Vertical Position</label>
                        <input type="range" id="photoY" min="0" max="100" value="35" class="slider">
                    </div>
                    <div class="control-group">
                        <label class="control-label">Horizontal Position</label>
                        <input type="range" id="photoX" min="0" max="100" value="50" class="slider">
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="changePhotoBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        Change Photo
                    </button>
                    <button class="btn btn-primary" id="downloadBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Download Banner
                    </button>
                    <button class="btn btn-x" id="postXBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                        </svg>
                        Post on X
                    </button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Made with ❤️ for solidarity</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
